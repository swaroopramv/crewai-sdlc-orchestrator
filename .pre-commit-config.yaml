# Pre-commit hooks — run automatically before each local commit.
# Setup (once):
#   pip install pre-commit
#   pre-commit install
# Run manually on all files:
#   pre-commit run --all-files

repos:
  # --- Secret detection (blocks commits containing secrets) ---
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.4
    hooks:
      - id: gitleaks

  # --- General hygiene ---
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: detect-private-key          # blocks committed private keys
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-added-large-files     # blocks accidental large/binary files
        args: ["--maxkb=1024"]
      - id: check-merge-conflict
      - id: check-yaml
      - id: check-json

  # --- Lint + format (matches CI) ---
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format
